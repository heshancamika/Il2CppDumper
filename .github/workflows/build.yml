name: Build My Dumper
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
    - name: Build
      run: msbuild Il2CppDumper.sln /p:Configuration=Release
    - name: Upload Binary
      uses: actions/upload-artifact@v2
      with:
        name: CustomDumper
        path: Il2CppDumper/bin/Release/Il2CppDumper.exe
