name: Build Il2CppDumper for Termux (Android)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-linux-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore Il2CppDumper.sln

      - name: Publish (linux-arm64, self-contained)
        run: |
          dotnet publish Il2CppDumper/Il2CppDumper.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Il2CppDumper-Android-ARM64
          path: ./output/Il2CppDumper
          retention-days: 30
