name: Build Il2CppDumper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Il2CppDumper/Il2CppDumper.csproj

      - name: Publish win-x64
        run: dotnet publish Il2CppDumper/Il2CppDumper.csproj -f net8.0 -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./output

      - name: Upload Il2CppDumper.exe
        uses: actions/upload-artifact@v4
        with:
          name: Il2CppDumper-exe
          path: ./output/Il2CppDumper.exe
          retention-days: 30
