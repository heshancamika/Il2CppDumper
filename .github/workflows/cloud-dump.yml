name: IL2CPP Cloud Dump
on:
  workflow_dispatch:
    inputs:
      libil2cpp_url:
        description: 'libil2cpp.so download URL'
        required: true
      metadata_url:
        description: 'global-metadata.dat download URL'
        required: true

permissions:
  contents: write
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build Il2CppDumper
        run: |
          dotnet restore Il2CppDumper/Il2CppDumper.csproj
          dotnet publish Il2CppDumper/Il2CppDumper.csproj -f net8.0 -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./dumper
      - name: Download game files
        run: |
          mkdir -p ./gamefiles
          python3 - <<'PYEOF'
          import urllib.request, re, sys, os

          def get_direct_url(url):
              if 'mediafire.com' in url:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  html = urllib.request.urlopen(req).read().decode('utf-8', errors='ignore')
                  match = re.search(r'href="(https://downloadd*.mediafire.com/[^"]+)"', html)
                  if match:
                      return match.group(1)
                  match = re.search(r'"(https://downloadd*.mediafire.com/[^"]+)"', html)
                  if match:
                      return match.group(1)
              return url

          libil2cpp_url = os.environ['LIBIL2CPP_URL']
          metadata_url = os.environ['METADATA_URL']

          print(f"Downloading libil2cpp.so from: {libil2cpp_url}")
          direct1 = get_direct_url(libil2cpp_url)
          print(f"Direct URL: {direct1}")
          urllib.request.urlretrieve(direct1, './gamefiles/libil2cpp.so')

          print(f"Downloading global-metadata.dat from: {metadata_url}")
          direct2 = get_direct_url(metadata_url)
          print(f"Direct URL: {direct2}")
          urllib.request.urlretrieve(direct2, './gamefiles/global-metadata.dat')

          print("Downloads complete!")
          PYEOF
        env:
          LIBIL2CPP_URL: ${{ github.event.inputs.libil2cpp_url }}
          METADATA_URL: ${{ github.event.inputs.metadata_url }}
      - name: Prepare output dir and run Il2CppDumper
        run: |
          mkdir -p ./gamefiles ./dump-output
          ls -la ./gamefiles/
          chmod +x ./dumper/Il2CppDumper
          export DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
          ./dumper/Il2CppDumper ./gamefiles/libil2cpp.so ./gamefiles/global-metadata.dat ./dump-output/ || true
          ls -la ./dump-output/
      - name: Parse dump.cs for real offsets
        run: |
          python3 - << 'PYEOF'
          import re, json, os
          dump_path = "./dump-output/dump.cs"
          if not os.path.exists(dump_path):
              print("dump.cs not found, skipping parse")
              exit(0)
          with open(dump_path, encoding="utf-8", errors="ignore") as f:
              content = f.read()
          keywords = ["headshot", "HeadShot", "Headshot", "HeadDamage", "headDamage",
                      "head_shot", "HeadMultiplier", "headShotMultiplier", "Headshot_Multiplier",
                      "damage", "Damage", "health", "Health", "armor", "Armor"]
          results = []
          lines = content.split("
")
          for i, line in enumerate(lines):
              m = re.search(r"// Offset: (0x[0-9A-Fa-f]+)", line)
              if m:
                  offset = m.group(1)
                  context = "
".join(lines[max(0,i-2):i+3])
                  for kw in keywords:
                      if kw.lower() in context.lower():
                          field_line = lines[i+1] if i+1 < len(lines) else ""
                          results.append({"offset": offset, "keyword": kw, "context": field_line.strip()})
                          break
          class_results = []
          for m in re.finditer(r"public class (w*(?:head|shot|damage|health)w*)", content, re.IGNORECASE):
              class_results.append({"class": m.group(1)})
          output = {"real_offsets": results, "classes": class_results}
          with open("./dump-output/real_offsets.json", "w") as f:
              json.dump(output, f, indent=2)
          print(f"Found {len(results)} real offset entries, {len(class_results)} relevant classes")
          PYEOF
      - uses: actions/upload-artifact@v4
        with:
          name: dump-output
          path: ./dump-output/
          retention-days: 30
      - name: Create GitHub Release with dump output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="dump-run-${{ github.run_id }}"
          FILES=$(find ./dump-output -type f | tr '
' ' ')
          if [ -n "$FILES" ]; then
            gh release create "$TAG"               --repo "${{ github.repository }}"               --title "Dump Output (Run #${{ github.run_number }})"               --notes "Auto-generated IL2CPP dump output. Download files below."               --prerelease               $FILES
            echo "Release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          else
            echo "No dump output files found — skipping release"
          fi
